name: CI

on:
  push:
    branches: [ main, fix/** ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11, 3.12]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt || true
          pip install -e backend
      - name: Run backend tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest -q backend/tests

  agent-framework-tests:
    runs-on: ubuntu-latest
    needs: backend-tests
    strategy:
      matrix:
        python-version: [3.11, 3.12]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r agent-framework/backend/requirements.txt || true
          pip install -e agent-framework/backend
      - name: Run agent-framework tests
        env:
          PYTHONPATH: agent-framework/backend
        run: |
          cd agent-framework/backend && pytest -q
