name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.12]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install backend dependencies and dev tools
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip setuptools
          if [ -f backend/requirements.txt ]; then .venv/bin/pip install -r backend/requirements.txt; fi
          .venv/bin/pip install ruff black pytest pytest-asyncio

      - name: Lint (ruff + black check)
        run: |
          .venv/bin/ruff check .
          .venv/bin/black --check .

      - name: Run backend tests
        run: |
          export PYTHONPATH=.:backend
          .venv/bin/pytest backend/tests/ -q
        env:
          CI: true
